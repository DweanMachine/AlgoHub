<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoHub</title>
  <link rel="stylesheet" href="sort-style.css">
</head>
<body>
  <header>
    <h1 style="color:white">ALGO<span style="color:aquamarine">HUB</span></h1>
    <a href=""><h3 class="header-text">Sorting</h3></a>
    <a href="crypto-index.html"><h3 class="header-text">Cryptography</h3></a>
  </header>
  <hr>
  <div id="config">
    <select id="algorithms">
      <option selected disabled>Select Algorithm:</option>
      <option id="bubble-sort" value="bubble">Bubble Sort</option>
      <option id="insertion-sort" value="insert">Insertion Sort</option>
      <option id="selection-sort" value="select">Selection Sort</option>
      <option id="merge-sort" value="merge">Merge Sort</option>
      <option id="quick-sort" value="quick">Quick Sort</option>
      <option id="bucket-sort" value="bucket">Bucket Sort</option>
      <option id="radix-sort" value="radix">Radix Sort</option>
    </select>

    <button id="chosen-sort">Sort</button>
    <div class="slider">
      <label id="bar-count-label" for="bar-slider">Bars: 12</label>
      <input id="bar-slider" type="range" value="12" min="3" max="250" step="1">
    </div>
    <div class="slider">
      <label id="speed-label" for="speed-slider">Delay: 15 ms</label>
      <input id="speed-slider" type="range" value="15" min="1" max="120" step="1">
    </div>
    <div id="bucket-slider-container" class="slider hidden">
      <label id="bucket-label" for="bucket-slider">Buckets: 5</label>
      <input id="bucket-slider" type="range" value="5" min="2" max="12" step="1">
    </div>
    <div id="radix-slider-container" class="slider hidden">
      <label id="radix-exp-label" for="radix-exp-slider">Exponent: 2</label>
      <input id="radix-exp-slider" type="range" value="2" min="2" max="10" step="1">
    </div>
    <button id="btn-generate">Create New Values</button>

    <div id="timer-config">
      <h2 id="timer">Ready!</h2>
    </div>
  </div>
  
  <div id="container"></div>
  <div id="bucketContainer"></div>
  
  <script src="sort-code.js"></script>
</body>
</html>
