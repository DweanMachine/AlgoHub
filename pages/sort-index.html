<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoHub</title>
  <link rel="stylesheet" href="../assets/css/sort-style.css">
  <script src="https://kit.fontawesome.com/ee13ff4682.js" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1 style="color:white">ALGO<span style="color:aquamarine">HUB</span></h1>
    <a href=""><h3 class="header-text">Sorting</h3></a>
    <a href="crypto-index.html"><h3 class="header-text">Cryptography</h3></a>
    <!-- Settings Button and Menu -->
    <div class="settings-wrapper" id="settings-wrapper">
      <i class="fa-solid fa-gear" id="settings-btn" aria-label="Settings" aria-expanded="false"></i>
      <div class="settings-menu" id="settings-menu" role="dialog" aria-label="Settings">
        <div class="settings-menu-header">SETTINGS</div>
        <hr>
        <div class="settings-menu-item">
          <label for="theme-select">Theme:</label>
          <button id="theme-light" value="light">Light</button>
          <button id="theme-dark" value="dark">Dark</button>
        </div>
        <hr>
        <div class="waveform">
          <label for="waveform-select">Waveform:</label>
          <select id="waveform-select">
            <option value="sine" selected>Sine</option>
            <option value="square">Square</option>
            <option value="triangle">Triangle</option>
            <option value="sawtooth">Sawtooth</option>
          </select>
        </div>
        <hr>
        <div class="settings-menu-item">
          <label for="volume-slider">Volume:</label>
          <br>
          <i class="fa-solid fa-volume-high" id="volume-icon"></i>
          <input id="volume-slider" type="range" value="50" min="0" max="100" step="1">
        </div>
      </div>
      
    </div>
  </header>

  <hr>
  <div id="config">
    <select id="algorithms">
      <option selected disabled>Select Algorithm:</option>
      <option id="bubble-sort" value="bubble">Bubble Sort</option>
      <option id="insertion-sort" value="insert">Insertion Sort</option>
      <option id="selection-sort" value="select">Selection Sort</option>
      <option id="merge-sort" value="merge">Merge Sort</option>
      <option id="quick-sort" value="quick">Quick Sort</option>
      <option id="heap-sort" value="heap">Heap Sort</option>
      <option id="count-sort" value="count">Count Sort</option>
      <option id="bucket-sort" value="bucket">Bucket Sort</option>
      <option id="radix-sort" value="radix">Radix Sort</option>
      <option id="bogo-sort" value="bogo">Bogo Sort</option>
    </select>

    <button id="chosen-sort">Sort</button>
    <div class="slider">
      <label id="bar-count-label" for="bar-slider">Bars: 30</label>
      <input id="bar-slider" type="range" value="30" min="3" max="300" step="1">
    </div>
    <div class="slider">
      <label id="speed-label" for="speed-slider">Delay: 70 ms</label>
      <input id="speed-slider" type="range" value="70" min="0" max="160" step="5">
    </div>
    <div id="bucket-slider-container" class="slider hidden">
      <label id="bucket-label" for="bucket-slider">Buckets: 5</label>
      <input id="bucket-slider" type="range" value="5" min="2" max="12" step="1">
    </div>
    <div id="radix-slider-container" class="slider hidden">
      <label id="radix-exp-label" for="radix-exp-slider">Exponent: 2</label>
      <input id="radix-exp-slider" type="range" value="2" min="2" max="10" step="1">
    </div>
    <button id="btn-generate">Create New Values</button>

    <div id="timer-config">
      <h2 id="timer">Ready!</h2>
    </div>
  </div>
  
  <div id="container"></div>
  <div id="bucketContainer"></div>
  
  <script type="module" src="../assets/js/sorting/main.js"></script>
</body>
</html>
